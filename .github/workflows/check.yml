name: VPO Check

on:
  schedule:
    - cron: '0 7 * * *'  # 07:00 UTC = 08:00/09:00 Madrid
  workflow_dispatch:      # allow manual trigger

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure DNS
        run: echo "nameserver 8.8.8.8" | sudo tee /etc/resolv.conf

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
        run: python main.py

      - name: Commit updated seen.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen.json
          git diff --staged --quiet || git commit -m "chore: update seen listings [skip ci]"
          git push
